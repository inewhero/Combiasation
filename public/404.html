<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>Redirecting...</title>
    <script>
      // GitHub Pages SPA fallback: redirect unknown paths to index with encoded path.
      (function () {
        const segmentCount = 1;
        const l = window.location;
        const repoBase = l.pathname.split('/').slice(0, 1 + segmentCount).join('/');
        const restPath = l.pathname
          .slice(1)
          .split('/')
          .slice(segmentCount)
          .join('/')
          .replace(/&/g, '~and~');
        const search = l.search ? '&' + l.search.slice(1).replace(/&/g, '~and~') : '';
        const target =
          l.protocol +
          '//' +
          l.hostname +
          (l.port ? ':' + l.port : '') +
          repoBase +
          '/?/' +
          restPath +
          search +
          l.hash;
        l.replace(target);
      })();
    </script>
  </head>
  <body></body>
</html>
