<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>Redirecting...</title>
    <script>
      // GitHub Pages SPA fallback: redirect unknown paths to index with encoded path.
      (function () {
        const segmentCount = 1;
        const location = window.location;
        const repoBase = location.pathname.split('/').slice(0, 1 + segmentCount).join('/');
        const restPath = location.pathname
          .slice(1)
          .split('/')
          .slice(segmentCount)
          .join('/')
          .replace(/&/g, '~and~');
        const search = location.search ? '&' + location.search.slice(1).replace(/&/g, '~and~') : '';
        const target =
          location.protocol +
          '//' +
          location.hostname +
          (location.port ? ':' + location.port : '') +
          repoBase +
          '/?/' +
          restPath +
          search +
          location.hash;
        location.replace(target);
      })();
    </script>
  </head>
  <body></body>
</html>
